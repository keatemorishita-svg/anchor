<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anchor · 评论区建联</title>
<style>
  :root {
    --bg: #080808;
    --bg-card: #0f0f0f;
    --border: #1c1c1c;
    --text: #ece6d5;
    --text-muted: #8e8878;
    --gold: #d4b85c;
    --gold-dim: rgba(212, 184, 92, 0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); height: 100%;
    display: flex; flex-direction: column; overflow: hidden;
    max-width: 480px; margin: 0 auto;
    border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  }

  .header {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .header .logo { font-size: 1.2rem; font-weight: 700; color: var(--gold); letter-spacing: 0.04em; }
  .header .badge {
    font-size: 0.7rem; color: var(--text-muted);
    border: 1px solid rgba(212,184,92,0.2); border-radius: 99px; padding: 2px 10px;
  }

  .messages {
    flex: 1; overflow-y: auto; padding: 12px 10px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg {
    max-width: 88%; padding: 14px 16px; font-size: 16px; line-height: 1.65;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user {
    align-self: flex-end; background: #111;
    border-right: 2px solid rgba(200,164,78,0.35);
  }
  .msg.ai {
    align-self: flex-start; background: #0c0c0c;
    border: 1px solid var(--border);
  }
  .msg .btns { display: flex; gap: 8px; margin-top: 10px; }
  .msg .copy-btn, .msg .style-btn {
    flex: 1; font-size: 13px; font-weight: 600; cursor: pointer;
    background: none; padding: 10px 0; text-align: center; min-height: 44px;
  }
  .msg .copy-btn { color: #f0d878; border: 1px solid rgba(212,184,92,0.4); }
  .msg .copy-btn:active { background: var(--gold-dim); }
  .msg .style-btn { color: var(--text-muted); border: 1px solid rgba(255,255,255,0.12); }
  .msg .style-btn:active { background: rgba(255,255,255,0.04); }
  .msg.loading { opacity: 0.4; }
  .msg.error { color: #c07860; border-color: rgba(192,120,96,0.2); }
  .empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 14px; text-align: center;
  }

  .comment-bar {
    flex-shrink: 0; background: var(--bg); border-top: 1px solid var(--border);
    padding: 8px 12px; padding-bottom: max(8px, env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 8px;
  }
  .textarea-wrap { position: relative; }
  .comment-bar textarea {
    width: 100%; padding: 10px; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--text); font-size: 15px;
    font-family: inherit; outline: none; resize: none; line-height: 1.5;
  }
  .comment-bar textarea:focus { border-color: var(--gold); }
  .comment-bar textarea::placeholder { color: var(--text-muted); font-size: 14px; }
  .clear-btn {
    position: absolute; top: 0; right: 0;
    width: 26px; height: 26px;
    border: 1px solid transparent;
    background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.3);
    font-size: 14px; cursor: pointer; border-radius: 0;
    display: none; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .clear-btn:hover {
    background: var(--gold-dim); color: var(--gold);
    border-color: var(--gold);
  }
  .clear-btn.visible { display: flex; }
  .actions { display: flex; gap: 6px; align-items: center; }
  .drop-wrap { position: relative; flex: 1; min-width: 0; }
  .drop-btn {
    padding: 8px 6px; border: 1px solid var(--border);
    background: var(--bg-card); cursor: pointer; text-align: center;
    min-height: 42px; display: flex; flex-direction: column; justify-content: center;
  }
  .drop-btn:active { border-color: var(--gold); }
  .drop-btn .dl { font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em; }
  .drop-btn .dv { font-size: 14px; color: var(--text); margin-top: 1px; }
  .drop-menu {
    display: none; position: absolute; bottom: 100%; left: 0;
    margin-bottom: 4px; background: var(--bg-card); border: 1px solid var(--border);
    min-width: 100%; z-index: 10;
  }
  .drop-menu.open { display: block; }
  .drop-opt {
    padding: 10px 12px; font-size: 14px; color: var(--text-muted);
    cursor: pointer; white-space: nowrap; min-height: 40px;
    display: flex; align-items: center;
  }
  .drop-opt:active { background: var(--gold-dim); color: var(--text); }
  .drop-opt.active { color: var(--gold); }
  .gen-btn {
    flex-shrink: 0; width: 64px; padding: 10px 0;
    border: 1px solid var(--gold); background: transparent;
    color: #f0d878; font-size: 15px; font-weight: 600;
    cursor: pointer; min-height: 42px; letter-spacing: 0.06em;
  }
  .gen-btn:active { background: var(--gold); color: #080808; }
  .gen-btn:disabled { opacity: 0.2; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">Anchor</span>
  <span class="badge">评论区建联</span>
</div>

<div class="messages" id="messages">
  <div class="empty">粘贴博主内容，生成评论</div>
</div>

<div class="comment-bar">
  <div class="textarea-wrap">
    <textarea id="targetContent" placeholder="粘贴对方的视频号内容、文案..." rows="3"></textarea>
    <button class="clear-btn" id="clearBtn">&times;</button>
  </div>
  <div class="actions">
    <div class="drop-wrap" id="typeWrap">
      <div class="drop-btn" id="typeBtn"><span class="dl">目的</span><span class="dv">建联</span></div>
      <div class="drop-menu" id="typeMenu"></div>
    </div>
    <div class="drop-wrap" id="styleWrap">
      <div class="drop-btn" id="styleBtn"><span class="dl">风格</span><span class="dv">共鸣</span></div>
      <div class="drop-menu" id="styleMenu"></div>
    </div>
    <div class="drop-wrap" id="toneWrap">
      <div class="drop-btn" id="toneBtn"><span class="dl">语气</span><span class="dv">谦逊</span></div>
      <div class="drop-menu" id="toneMenu"></div>
    </div>
    <button class="gen-btn" id="genBtn">生成</button>
  </div>
</div>

<script>
const DIMS = {{ dimensions | tojson }};
const TONES = {{ tones | tojson }};

let activeType = 'build_link';
let activeStyle = 'resonance';
let activeTone = 'humble';
let firstMsg = true;

const messagesDiv = document.getElementById('messages');
const textarea = document.getElementById('targetContent');
const genBtn = document.getElementById('genBtn');
const clearBtn = document.getElementById('clearBtn');

function buildMenu(menuEl, options, activeKey, onSelect) {
  menuEl.innerHTML = '';
  Object.entries(options).forEach(([key, opt]) => {
    const div = document.createElement('div');
    div.className = 'drop-opt' + (key === activeKey ? ' active' : '');
    div.dataset.key = key;
    div.textContent = opt.label;
    div.addEventListener('click', () => {
      menuEl.querySelectorAll('.drop-opt').forEach(o => o.classList.remove('active'));
      div.classList.add('active');
      onSelect(key, opt.label);
      menuEl.classList.remove('open');
    });
    menuEl.appendChild(div);
  });
}

function setupDrop(btn, menu) {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.drop-menu.open').forEach(d => {
      if (d !== menu) d.classList.remove('open');
    });
    menu.classList.toggle('open');
  });
}

const typeMenu = document.getElementById('typeMenu');
const styleMenu = document.getElementById('styleMenu');
const toneMenu = document.getElementById('toneMenu');

buildMenu(typeMenu, DIMS.comment_type.options, activeType, (key, label) => {
  activeType = key;
  document.getElementById('typeBtn').querySelector('.dv').textContent = label;
});
buildMenu(styleMenu, DIMS.comment_style.options, activeStyle, (key, label) => {
  activeStyle = key;
  document.getElementById('styleBtn').querySelector('.dv').textContent = label;
});
buildMenu(toneMenu, TONES, activeTone, (key, label) => {
  activeTone = key;
  document.getElementById('toneBtn').querySelector('.dv').textContent = label;
});

setupDrop(document.getElementById('typeBtn'), typeMenu);
setupDrop(document.getElementById('styleBtn'), styleMenu);
setupDrop(document.getElementById('toneBtn'), toneMenu);

document.addEventListener('click', () => {
  document.querySelectorAll('.drop-menu.open').forEach(d => d.classList.remove('open'));
});

// textarea clear
function updateClear() { clearBtn.classList.toggle('visible', textarea.value.length > 0); }
clearBtn.addEventListener('click', () => { textarea.value = ''; updateClear(); textarea.focus(); });
textarea.addEventListener('input', updateClear);

// messages
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addMessage(text, role) {
  if (firstMsg) { messagesDiv.innerHTML = ''; firstMsg = false; }
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = esc(text);

  if (role === 'ai' && text && !text.startsWith('❌')) {
    const btns = document.createElement('div');
    btns.className = 'btns';

    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = '复制评论';
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(text);
      copyBtn.textContent = '已复制 ✓';
      setTimeout(() => copyBtn.textContent = '复制评论', 2000);
    });
    btns.appendChild(copyBtn);

    const styleBtn = document.createElement('button');
    styleBtn.className = 'style-btn';
    styleBtn.textContent = '换风格';
    styleBtn.addEventListener('click', () => {
      cycleStyle();
      generate(false);
    });
    btns.appendChild(styleBtn);

    div.appendChild(btns);
  }
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function cycleStyle() {
  const keys = Object.keys(DIMS.comment_style.options);
  const idx = keys.indexOf(activeStyle);
  activeStyle = keys[(idx + 1) % keys.length];
  const label = DIMS.comment_style.options[activeStyle].label;
  document.getElementById('styleBtn').querySelector('.dv').textContent = label;
  styleMenu.querySelectorAll('.drop-opt').forEach(o => {
    o.classList.toggle('active', o.dataset.key === activeStyle);
  });
}

async function generate(showUser = true) {
  const content = textarea.value.trim();
  if (!content) return;

  genBtn.disabled = true;

  if (showUser) {
    const preview = content.length > 60 ? content.slice(0, 60) + '...' : content;
    addMessage(preview, 'user');
  }

  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'msg ai loading';
  loadingDiv.textContent = '思考中...';
  messagesDiv.appendChild(loadingDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        comment_type: activeType,
        comment_style: activeStyle,
        tone: activeTone,
        target_content: content,
      }),
    });
    const data = await resp.json();
    loadingDiv.remove();
    if (data.error) {
      addMessage('❌ ' + data.error, 'error');
    } else {
      addMessage(data.reply, 'ai');
    }
  } catch (err) {
    loadingDiv.remove();
    addMessage('❌ 网络错误，请检查服务器是否运行', 'error');
  }
  genBtn.disabled = false;
}

genBtn.addEventListener('click', generate);
textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
});
</script>
</body>
</html>
